<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SCEL 词库转换器</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #0f0e0d;
    --paper:  #f5f0e8;
    --paper2: #ede8de;
    --red:    #c0392b;
    --red-dim:#8b1a13;
    --gold:   #b8860b;
    --line:   rgba(15,14,13,0.15);
    --mono:   'JetBrains Mono', monospace;
    --serif:  'Noto Serif SC', serif;
  }

  html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: var(--serif); overflow-x: hidden; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg,  transparent, transparent 31px, var(--line) 31px, var(--line) 32px),
      repeating-linear-gradient(90deg, transparent, transparent 31px, var(--line) 31px, var(--line) 32px);
    pointer-events: none; z-index: 0; opacity: .45;
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: grid; grid-template-rows: auto 1fr auto;
    max-width: 860px; margin: 0 auto; padding: 0 24px;
  }

  header {
    padding: 48px 0 32px; border-bottom: 2px solid var(--ink);
    display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
  }
  .logo-zh { font-size: clamp(36px, 8vw, 72px); font-weight: 900; line-height: 1; letter-spacing: -.02em; }
  .logo-zh span { color: var(--red); }
  .logo-sub { margin-top: 6px; font-family: var(--mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); }
  .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
  .badge { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; border: 1px solid var(--ink); padding: 5px 10px; background: var(--ink); color: var(--paper); white-space: nowrap; }
  .header-link { display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; letter-spacing:.08em; color:rgba(15,14,13,.7); text-decoration:none; border:1px solid rgba(15,14,13,.28); padding:4px 10px; background:var(--paper2); transition:color .15s, border-color .15s, background .15s; white-space:nowrap; }
  .header-link:hover { color:var(--red); border-color:var(--red); background:rgba(192,57,43,.06); }
  .github-icon { width:14px; height:14px; display:block; }

  main { padding: 40px 0 60px; display: flex; flex-direction: column; gap: 32px; }

  .drop-zone {
    border: 2px dashed var(--ink); padding: 56px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    cursor: pointer; transition: background .2s, border-style .2s;
    position: relative; overflow: hidden; background: var(--paper2);
  }
  .drop-zone::after { content:''; position:absolute; inset:0; background:var(--ink); opacity:0; transition:opacity .2s; pointer-events:none; }
  .drop-zone:hover::after, .drop-zone.drag-over::after { opacity:.04; }
  .drop-zone.drag-over { border-style: solid; }
  .drop-icon { width:52px; height:52px; border:2px solid var(--ink); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .drop-title { font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .drop-hint { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:rgba(15,14,13,.5); }
  .drop-btn { margin-top:4px; font-family:var(--mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase; background:var(--ink); color:var(--paper); border:none; padding:10px 24px; cursor:pointer; transition:background .15s; position:relative; z-index:1; }
  .drop-btn:hover { background: var(--red); }
  input[type=file] { display:none; }

  .file-list { display:none; flex-direction:column; border:2px solid var(--ink); }
  .file-list.visible { display:flex; }
  .file-item { display:grid; grid-template-columns:28px 1fr auto auto; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); font-family:var(--mono); font-size:12px; animation:slide-in .25s ease both; }
  .file-item:last-child { border-bottom:none; }
  @keyframes slide-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .file-num { font-size:10px; color:rgba(15,14,13,.4); text-align:right; }
  .file-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .file-size { color:rgba(15,14,13,.5); font-size:11px; white-space:nowrap; }
  .file-remove { background:none; border:none; cursor:pointer; font-size:16px; line-height:1; color:rgba(15,14,13,.35); padding:0 2px; transition:color .15s; }
  .file-remove:hover { color:var(--red); }

  .actions { display:flex; gap:12px; flex-wrap:wrap; }
  .btn-convert { font-family:var(--mono); font-size:13px; letter-spacing:.15em; text-transform:uppercase; background:var(--red); color:var(--paper); border:2px solid var(--red); padding:14px 36px; cursor:pointer; transition:background .15s,color .15s; font-weight:600; }
  .btn-convert:disabled { background:var(--paper2); color:rgba(15,14,13,.35); border-color:var(--line); cursor:not-allowed; }
  .btn-convert:not(:disabled):hover { background:var(--red-dim); border-color:var(--red-dim); }
  .btn-clear { font-family:var(--mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase; background:none; color:rgba(15,14,13,.55); border:2px solid var(--line); padding:14px 24px; cursor:pointer; transition:border-color .15s,color .15s; }
  .btn-clear:hover { border-color:var(--ink); color:var(--ink); }

  .progress-wrap { display:none; flex-direction:column; gap:10px; }
  .progress-wrap.visible { display:flex; }
  .progress-label { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; display:flex; justify-content:space-between; }
  .progress-bar-bg { height:4px; background:var(--paper2); border:1px solid var(--line); overflow:hidden; }
  .progress-bar-fill { height:100%; background:var(--red); width:0%; transition:width .3s ease; }

  .log-panel { background:var(--ink); color:#a8d5a2; font-family:var(--mono); font-size:12px; line-height:1.8; padding:20px 24px; max-height:220px; overflow-y:auto; display:none; border:2px solid var(--ink); }
  .log-panel.visible { display:block; }
  .log-line { animation:fade-log .2s ease both; }
  @keyframes fade-log { from { opacity:0; } to { opacity:1; } }
  .log-line.err  { color:#ff8a7a; }
  .log-line.ok   { color:#a8d5a2; }
  .log-line.info { color:#f5c97a; }

  .results { display:none; flex-direction:column; border:2px solid var(--ink); }
  .results.visible { display:flex; }
  .results-header { background:var(--ink); color:var(--paper); font-family:var(--mono); font-size:11px; letter-spacing:.15em; text-transform:uppercase; padding:10px 16px; display:flex; justify-content:space-between; align-items:center; }
  .result-item { display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:16px; padding:14px 16px; border-bottom:1px solid var(--line); animation:slide-in .3s ease both; }
  .result-item:last-child { border-bottom:none; }
  .result-name { font-size:14px; font-weight:700; }
  .result-meta { font-family:var(--mono); font-size:11px; color:rgba(15,14,13,.5); }
  .result-actions { display:flex; gap:10px; align-items:center; }
  .btn-preview { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; background:var(--paper2); border:2px solid var(--ink); padding:8px 18px; cursor:pointer; transition:background .15s,color .15s; white-space:nowrap; color:var(--ink); }
  .btn-preview:hover { background:var(--ink); color:var(--paper); }
  .btn-dl { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; background:none; border:2px solid var(--ink); padding:8px 18px; cursor:pointer; transition:background .15s,color .15s; white-space:nowrap; text-decoration:none; color:var(--ink); display:inline-block; }
  .btn-dl:hover { background:var(--ink); color:var(--paper); }
  .btn-dl-all { font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; background:none; border:1px solid rgba(245,240,232,.4); padding:6px 14px; cursor:pointer; color:var(--paper); transition:background .15s; }
  .btn-dl-all:hover { background:rgba(245,240,232,.15); }
  .preview { display:none; flex-direction:column; border:2px solid var(--ink); background:var(--paper2); }
  .preview.visible { display:flex; }
  .preview-header { display:flex; justify-content:space-between; gap:16px; padding:12px 16px; border-bottom:1px solid var(--line); align-items:baseline; }
  .preview-name { font-size:15px; font-weight:700; }
  .preview-meta { font-family:var(--mono); font-size:11px; color:rgba(15,14,13,.55); }
  .preview-body { margin:0; padding:18px 16px 20px; max-height:320px; overflow:auto; font-family:var(--mono); font-size:12px; line-height:1.7; white-space:pre-wrap; word-break:break-word; }

  footer { border-top:1px solid var(--line); padding:20px 0 28px; font-family:var(--mono); font-size:11px; letter-spacing:.08em; color:rgba(15,14,13,.4); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }

  .log-panel::-webkit-scrollbar { width:4px; }
  .log-panel::-webkit-scrollbar-track { background:transparent; }
  .log-panel::-webkit-scrollbar-thumb { background:#3a3a3a; border-radius:2px; }
  .preview-body::-webkit-scrollbar { width:4px; }
  .preview-body::-webkit-scrollbar-track { background:transparent; }
  .preview-body::-webkit-scrollbar-thumb { background:#3a3a3a; border-radius:2px; }

  @media (max-width:560px) {
    .result-item { grid-template-columns:1fr; }
    .result-actions { justify-content:flex-start; }
    header { flex-direction:column; align-items:flex-start; }
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <div class="logo-zh">词库<span>转</span>换</div>
      <div class="logo-sub">Sogou SCEL → Plain Text Converter</div>
    </div>
    <div class="header-right">
      <a class="header-link" href="https://github.com/Bingzgoj/scel_converter" target="_blank" rel="noopener noreferrer" aria-label="GitHub 项目地址">
        <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M8 0a8 8 0 0 0-2.53 15.59c.4.07.55-.17.55-.38v-1.33c-2.24.49-2.71-.95-2.71-.95-.36-.93-.89-1.17-.89-1.17-.72-.49.06-.48.06-.48.8.06 1.22.82 1.22.82.71 1.2 1.87.86 2.33.66.07-.5.28-.86.5-1.05-1.79-.2-3.68-.89-3.68-3.95 0-.87.31-1.58.82-2.13-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.81A7.6 7.6 0 0 1 8 3.87c.68 0 1.36.09 2 .27 1.52-1.02 2.2-.81 2.2-.81.44 1.1.16 1.92.08 2.12.51.55.82 1.26.82 2.13 0 3.07-1.89 3.75-3.69 3.95.29.24.54.72.54 1.46v2.16c0 .21.14.45.55.38A8 8 0 0 0 8 0Z"/>
        </svg>
        <span>项目地址</span>
      </a>
      <div class="badge">静态 · 离线 · 纯前端</div>
    </div>
  </header>

  <main>
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📂</div>
      <div class="drop-title">拖放 .scel 文件到此处</div>
      <div class="drop-hint">支持批量导入多个文件</div>
      <button class="drop-btn" id="browseBtn">选择文件</button>
      <input type="file" id="fileInput" accept=".scel" multiple />
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="actions">
      <button class="btn-convert" id="convertBtn" disabled>▶ 开始转换</button>
      <button class="btn-clear"   id="clearBtn">清空</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressText">处理中…</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="log-panel" id="logPanel"></div>

    <div class="results" id="results">
      <div class="results-header">
        <span>转换结果</span>
        <button class="btn-dl-all" id="dlAllBtn">全部下载</button>
      </div>
      <div id="resultItems"></div>
    </div>

    <div class="preview" id="preview">
      <div class="preview-header">
        <span class="preview-name" id="previewName"></span>
        <span class="preview-meta" id="previewMeta"></span>
      </div>
      <pre class="preview-body" id="previewBody"></pre>
    </div>
  </main>

  <footer>
    <span>搜狗 .scel 词库解析器 · 全程本地处理，不上传任何数据</span>
    <span>Pure Browser · No Server · MIT</span>
  </footer>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
